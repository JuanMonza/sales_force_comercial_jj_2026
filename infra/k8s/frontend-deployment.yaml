apiVersion: apps/v1
kind: Deployment
metadata:
  name: salesforce-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: salesforce-frontend
  template:
    metadata:
      labels:
        app: salesforce-frontend
    spec:
      containers:
        - name: frontend
          image: salesforce-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.your-domain.com/api"
---
apiVersion: v1
kind: Service
metadata:
  name: salesforce-frontend
spec:
  selector:
    app: salesforce-frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

